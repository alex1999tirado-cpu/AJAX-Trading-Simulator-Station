name: Build Desktop Apps

on:
  workflow_dispatch:
  push:
    branches:
      - main

jobs:
  build-macos:
    runs-on: macos-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: python3 -m pip install -r requirements.txt pyinstaller

      - name: Build macOS app
        run: ./build_macos_app.sh --dmg

      - name: Upload macOS artifacts
        uses: actions/upload-artifact@v4
        with:
          name: MacOS v0.1
          path: |
            dist/Valorador de Opciones.app
            dist/Valorador de Opciones.dmg

  build-windows:
    runs-on: windows-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: python -m pip install -r requirements.txt pyinstaller

      - name: Build Windows executable
        run: .\build_windows_exe.bat

      - name: Upload Windows artifacts
        uses: actions/upload-artifact@v4
        with:
          name: Windows v0.1
          path: dist/Valorador de Opciones
